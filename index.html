<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harita Sayfaları Analiz Paneli</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
        }
        h1 {
            color: #58a6ff;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .guncelleme {
            color: #8b949e;
            font-size: 14px;
            margin-bottom: 30px;
            background: #161b22;
            padding: 10px 15px;
            border-radius: 6px;
            display: inline-block;
            border: 1px solid #30363d;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #161b22;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #30363d;
        }
        th, td {
            padding: 15px;
            text-align: left;
        }
        th {
            background-color: #21262d;
            color: #f0f6fc;
            font-weight: 600;
            border-bottom: 2px solid #30363d;
        }
        tr {
            border-bottom: 1px solid #30363d;
        }
        tr:last-child {
            border-bottom: none;
        }
        tr:hover {
            background-color: #1f242c;
        }
        .sira {
            font-weight: bold;
            color: #8b949e;
            width: 50px;
            text-align: center;
        }
        .link {
            color: #58a6ff;
            text-decoration: none;
            font-weight: 500;
        }
        .link:hover {
            text-decoration: underline;
        }
        .bayrak {
            margin-left: 8px;
            font-size: 18px;
            vertical-align: middle;
        }
        .sayi {
            font-weight: 700;
            color: #56d364;
            text-align: right;
        }
        th.sag, td.sag {
            text-align: right;
        }
        th.orta, td.orta {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📍 Harita Sayfaları Analiz Paneli</h1>
        <div class="guncelleme">🔄 Son Güncelleme (TSİ): 15.06.2026 - 21:06</div>
        
        <table>
            <thead>
                <tr>
                    <th class="orta">Sıra</th>
                    <th>Sayfa Adı</th>
                    <th class="sag">Takipçi Sayısı</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="orta sira">1</td>
                    <td>
                        <a class="link" href="https://instagram.com/the.world.in.maps" target="_blank">@the.world.in.maps</a>
                        <span class="bayrak">🇧🇪</span>
                    </td>
                    <td class="sag sayi">866K</td>
                </tr>
                <tr>
                    <td class="orta sira">2</td>
                    <td>
                        <a class="link" href="https://instagram.com/katapultmagazin" target="_blank">@katapultmagazin</a>
                        <span class="bayrak">🇩🇪</span>
                    </td>
                    <td class="sag sayi">575K</td>
                </tr>
                <tr>
                    <td class="orta sira">3</td>
                    <td>
                        <a class="link" href="https://instagram.com/terriblemap" target="_blank">@terriblemap</a>
                        <span class="bayrak">🇬🇧</span>
                    </td>
                    <td class="sag sayi">441K</td>
                </tr>
                <tr>
                    <td class="orta sira">4</td>
                    <td>
                        <a class="link" href="https://instagram.com/turkishgeopoliticalmaps" target="_blank">@turkishgeopoliticalmaps</a>
                        <span class="bayrak">🇹🇷</span>
                    </td>
                    <td class="sag sayi">9,251</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
