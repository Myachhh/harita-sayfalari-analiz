name: Takipci Robotu

on:
  workflow_dispatch:

jobs:
  veri-cek:
    runs-on: ubuntu-latest
    steps:
      - name: Dosyalari Al
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Araclari Yukle
        run: pip install -r requirements.txt

      - name: Kodu Calistir
        run: python main.py
