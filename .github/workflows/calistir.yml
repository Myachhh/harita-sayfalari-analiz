name: Takipci Robotu

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  veri-cek:
    runs-on: ubuntu-latest
    steps:
      - name: Dosyalari Al
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Araclari Yukle
        run: pip install -r requirements.txt

      - name: Kodu Calistir
        env:
          IG_SESSIONID: ${{ secrets.IG_SESSIONID }}
        run: python main.py

      - name: Dosyayi Depoya Geri Yukle
        run: |
          git config --global user.name "Takipci Robotu"
          git config --global user.email "actions@github.com"
          git add takipciler.csv README.md
          git commit -m "Takipci verileri ve vitrin guncellendi" || exit 0
          git push
